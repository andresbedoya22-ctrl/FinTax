<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb-copper" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 220) scale(680 420)">
      <stop offset="0%" stop-color="#B47B58" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#B47B58" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#B47B58" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-green" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1540 180) scale(620 380)">
      <stop offset="0%" stop-color="#36B677" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#36B677" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#36B677" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-teal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 900) scale(800 340)">
      <stop offset="0%" stop-color="#468EA4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#468EA4" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="1.05" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.04"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="#08101A"/>

  <!-- Ambient orbs -->
  <rect width="1920" height="1080" fill="url(#orb-copper)"/>
  <rect width="1920" height="1080" fill="url(#orb-green)"/>
  <rect width="1920" height="1080" fill="url(#orb-teal)"/>

  <!-- Technical grid (fine) -->
  <g opacity="0.055">
    <line x1="0" y1="120" x2="1920" y2="120" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1920" y2="240" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1920" y2="360" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1920" y2="480" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="1920" y2="600" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="0" y1="720" x2="1920" y2="720" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="0" y1="840" x2="1920" y2="840" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="0" y1="960" x2="1920" y2="960" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="192" y1="0" x2="192" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="384" y1="0" x2="384" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="576" y1="0" x2="576" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="768" y1="0" x2="768" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="1152" y1="0" x2="1152" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="1344" y1="0" x2="1344" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="1536" y1="0" x2="1536" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
    <line x1="1728" y1="0" x2="1728" y2="1080" stroke="#D9E3F0" stroke-width="0.5"/>
  </g>

  <!-- Diagonal accent lines -->
  <g opacity="0.07">
    <line x1="0" y1="480" x2="640" y2="0" stroke="#B47B58" stroke-width="1"/>
    <line x1="1920" y1="600" x2="1280" y2="1080" stroke="#36B677" stroke-width="0.8"/>
    <line x1="480" y1="1080" x2="1120" y2="0" stroke="#D9E3F0" stroke-width="0.5"/>
  </g>

  <!-- Data flow lines (horizontal curved) -->
  <g opacity="0.14">
    <path d="M0 380 C320 380 480 320 800 320 C1120 320 1280 380 1600 380 C1760 380 1860 350 1920 340" stroke="#90A4BF" stroke-width="1" fill="none"/>
    <path d="M0 720 C400 720 560 660 880 660 C1200 660 1360 740 1680 740 C1800 740 1880 720 1920 710" stroke="#B47B58" stroke-width="1" fill="none" stroke-opacity="0.6"/>
  </g>

  <!-- Corner accent marks -->
  <g opacity="0.18">
    <path d="M48 48 L48 80 M48 48 L80 48" stroke="#B47B58" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M1872 48 L1872 80 M1872 48 L1840 48" stroke="#B47B58" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M48 1032 L48 1000 M48 1032 L80 1032" stroke="#36B677" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M1872 1032 L1872 1000 M1872 1032 L1840 1032" stroke="#36B677" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Data badge top-right -->
  <rect x="1680" y="48" width="192" height="28" rx="14" fill="#36B677" fill-opacity="0.10" stroke="#36B677" stroke-opacity="0.2"/>
  <circle cx="1700" cy="62" r="4" fill="#36B677" fill-opacity="0.8"/>
  <text x="1712" y="67" font-family="IBM Plex Mono, monospace" font-size="11" fill="#36B677" fill-opacity="0.8">Fixed fee · EN ES PL RO</text>

  <!-- Grain overlay -->
  <rect width="1920" height="1080" filter="url(#grain)"/>
</svg>
