    </linearGradient>
    <linearGradient id="sidebar-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A1525"/>
      <stop offset="100%" stop-color="#0D1B2E"/>
    </linearGradient>
    <linearGradient id="card-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#122B1C"/>
      <stop offset="100%" stop-color="#0D2016"/>
    </linearGradient>
    <linearGradient id="card-copper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1E12"/>
      <stop offset="100%" stop-color="#1F160D"/>
    </linearGradient>
    <linearGradient id="chart-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#36B677" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#36B677" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="progress-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36B677"/>
      <stop offset="100%" stop-color="#B47B58"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.025"/></feComponentTransfer>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

